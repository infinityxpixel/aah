<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App Against Humanity</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='white'/><rect x='25' y='20' width='50' height='65' rx='8' fill='black'/></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Ubuntu:wght@400;700&display=swap');
        body { font-family: 'Ubuntu', sans-serif; background-color: #111; color: white; margin: 0; }
        .black-card { background-color: #000; border: 2px solid #262626; width: 18.9rem; height: 25.2rem; }
        .white-card { background-color: #fff; color: #000; min-height: 14rem; cursor: pointer; }
        .animate-pop { animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        @keyframes pop { 0% { transform: scale(0.92); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- UI Components ---
        const Trophy = () => <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#eab308" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg>;
        const ChevronRight = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="m9 18 6-6-6-6"/></svg>;

        const CARDS_DATABASE = {
            blackCards: [
                { text: "What's that smell?", pick: 1 },
                { text: "I drink to forget _.", pick: 1 },
                { text: "What's my secret superpower?", pick: 1 },
                { text: "In the distant future, historians will agree that _ was the beginning of the end.", pick: 1 },
                { text: "Wait, if you're here, then who's _?", pick: 1 },
                { text: "I got 99 problems but _ ain't one.", pick: 1 },
                { text: "What is Batman's guilty pleasure?", pick: 1 },
                { text: "What's a girl's best friend?", pick: 1 },
                { text: "He who controls _ controls the universe.", pick: 1 },
                { text: "What gives me uncontrollable gas?", pick: 1 },
                { text: "What are my parents hiding from me?", pick: 1 },
                { text: "Coming to Broadway this season: _: The Musical.", pick: 1 }
            ],
            whiteCards: [
                "Tax fraud.", "Aggressive yoga.", "A salty surprise.", "Existential dread.", "Florida Man.", "Bees?", "The Patriarchy.", "Gluten-free bread.", "Passive-aggressive Post-it notes.", "The Kool-Aid Man.", "A literal mountain of cocaine.", "Self-loathing.", "A disappointment to my parents.", "Taco Bell.", "A tiny horse.", "Mansplaining.", "Avocado toast.", "Social media validation.", "An unsolicited photo.", "The simulation crashing.", "Cryptocurrency scams."
            ]
        };

        const MAX_ROUNDS = 5; // Reduced for quick testing

        const App = () => {
            const [gameState, setGameState] = useState('auth');
            const [authInput, setAuthInput] = useState({ username: '', password: '' });
            const [players, setPlayers] = useState([
                { id: 1, name: 'Player 1', score: 0, hand: [] },
                { id: 2, name: 'Player 2', score: 0, hand: [] }
            ]);
            const [roundNumber, setRoundNumber] = useState(1);
            const [currentPlayerIdx, setCurrentPlayerIdx] = useState(0);
            const [roundBlackCard, setRoundBlackCard] = useState(null);
            const [allSubmissions, setAllSubmissions] = useState([]);
            const [selectedWhiteCard, setSelectedWhiteCard] = useState(null);
            const [deck, setDeck] = useState({ black: [], white: [] });
            const [votingRoundIndex, setVotingRoundIndex] = useState(1);

            // --- THE FIX: Answer Rendering Logic ---
            const renderCardContent = (blackText, whiteText) => {
                if (!whiteText) return blackText;
                const formattedWhite = `<span class="bg-white text-black px-3 py-1 rounded-lg mx-1 inline-block transform -rotate-1 shadow-md font-bold">${whiteText}</span>`;
                
                // If black card has an underscore, replace it.
                if (blackText.includes('_')) {
                    return blackText.replace('_', formattedWhite);
                }
                // If no underscore (Question type), append it to the end.
                return `${blackText} ${formattedWhite}`;
            };

            const handleLogin = (e) => {
                e.preventDefault();
                const key = "cmVlc2hvZg==";
                if (btoa(authInput.username) === key && btoa(authInput.password) === key) {
                    setGameState('setup');
                }
            };

            const startGame = () => {
                const whiteDeck = [...CARDS_DATABASE.whiteCards].sort(() => Math.random() - 0.5);
                const blackDeck = [...CARDS_DATABASE.blackCards].sort(() => Math.random() - 0.5);
                
                setPlayers(players.map((p, idx) => ({
                    ...p, score: 0, hand: whiteDeck.slice(idx * 8, (idx * 8) + 8) 
                })));
                setDeck({ white: whiteDeck.slice(16), black: blackDeck.slice(0, MAX_ROUNDS) });
                setRoundBlackCard(blackDeck[0]);
                setRoundNumber(1);
                setCurrentPlayerIdx(0);
                setAllSubmissions([]);
                setVotingRoundIndex(1);
                setGameState('play');
            };

            const submitResponse = () => {
                const newSub = {
                    id: `r${roundNumber}-p${currentPlayerIdx}-${Date.now()}`,
                    playerIdx: currentPlayerIdx,
                    playerName: players[currentPlayerIdx].name,
                    blackCard: roundBlackCard,
                    whiteCard: selectedWhiteCard,
                    round: roundNumber,
                    winner: false
                };
                
                setAllSubmissions(prev => [...prev, newSub]);
                setPlayers(players.map((p, idx) => 
                    idx === currentPlayerIdx ? { ...p, hand: p.hand.filter(c => c !== selectedWhiteCard) } : p
                ));
                setSelectedWhiteCard(null);

                if (currentPlayerIdx === 0) {
                    setCurrentPlayerIdx(1);
                } else if (roundNumber < MAX_ROUNDS) {
                    const next = roundNumber + 1;
                    setRoundNumber(next);
                    setCurrentPlayerIdx(0);
                    setRoundBlackCard(deck.black[next - 1]);
                } else {
                    setGameState('judging');
                }
            };

            const voteForSubmission = (id) => {
                setAllSubmissions(prev => {
                    const updated = prev.map(s => s.id === id ? { ...s, winner: true } : s);
                    const winnerSub = updated.find(s => s.id === id);
                    setPlayers(ps => ps.map((p, i) => i === winnerSub.playerIdx ? { ...p, score: p.score + 1 } : p));
                    return updated;
                });

                if (votingRoundIndex < MAX_ROUNDS) setVotingRoundIndex(v => v + 1);
                else setGameState('winner');
            };

            const currentVotingGroup = useMemo(() => 
                allSubmissions.filter(s => s.round === votingRoundIndex), 
            [allSubmissions, votingRoundIndex]);

            // --- Views ---
            if (gameState === 'auth') return (
                <div className="min-h-screen flex items-center justify-center bg-neutral-900 p-6">
                    <form onSubmit={handleLogin} className="bg-neutral-800 p-10 rounded-[40px] border border-neutral-700 w-full max-w-sm text-center animate-pop">
                        <h2 className="text-3xl font-black uppercase italic mb-8">Auth Required</h2>
                        <input type="text" placeholder="User" className="w-full bg-neutral-900 border border-neutral-700 rounded-2xl px-6 py-4 mb-4" onChange={e => setAuthInput({...authInput, username: e.target.value})} />
                        <input type="password" placeholder="Pass" className="w-full bg-neutral-900 border border-neutral-700 rounded-2xl px-6 py-4 mb-8" onChange={e => setAuthInput({...authInput, password: e.target.value})} />
                        <button type="submit" className="w-full bg-white text-black py-4 rounded-2xl font-black uppercase">Enter</button>
                    </form>
                </div>
            );

            if (gameState === 'setup') return (
                <div className="min-h-screen flex items-center justify-center bg-neutral-900 p-6">
                    <div className="bg-neutral-800 p-10 rounded-[40px] border border-neutral-700 w-full max-w-md text-center animate-pop">
                        <h1 className="text-6xl font-black italic mb-10">AAH</h1>
                        {players.map((p, i) => (
                            <input key={p.id} className="w-full bg-neutral-900 border border-neutral-700 rounded-2xl px-6 py-4 mb-4 font-bold" value={p.name} onChange={e => {
                                const n = [...players]; n[i].name = e.target.value; setPlayers(n);
                            }} />
                        ))}
                        <button onClick={startGame} className="w-full bg-white text-black py-5 rounded-2xl font-black text-xl uppercase mt-4">Start Game</button>
                    </div>
                </div>
            );

            if (gameState === 'play') return (
                <div className="min-h-screen flex flex-col pb-32">
                    <header className="p-6 border-b border-neutral-800 flex justify-between items-center">
                        <div className="font-black text-2xl italic">AAH</div>
                        <div className="bg-neutral-800 px-4 py-2 rounded-full text-[10px] font-black uppercase tracking-widest">
                            Round {roundNumber} • {players[currentPlayerIdx].name}'s Turn
                        </div>
                    </header>
                    <main className="p-8 flex flex-col items-center gap-12 max-w-7xl mx-auto">
                        <div className="black-card rounded-[32px] p-8 flex flex-col justify-between transform -rotate-1">
                            <p className="text-2xl font-bold leading-tight" dangerouslySetInnerHTML={{ __html: renderCardContent(roundBlackCard.text, "") }} />
                            <span className="text-[10px] font-black opacity-30 uppercase">App Against Humanity</span>
                        </div>
                        <div className="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-4">
                            {players[currentPlayerIdx].hand.map(card => (
                                <button key={card} onClick={() => setSelectedWhiteCard(card)} className={`white-card p-5 text-left rounded-2xl transition-all ${selectedWhiteCard === card ? 'ring-8 ring-blue-500 scale-105 z-10' : 'opacity-90 hover:-translate-y-1'}`}>
                                    <span className="font-bold text-lg">{card}</span>
                                </button>
                            ))}
                        </div>
                    </main>
                    <div className="fixed bottom-0 w-full p-8 bg-gradient-to-t from-black flex justify-center">
                        <button disabled={!selectedWhiteCard} onClick={submitResponse} className="w-full max-w-sm py-6 bg-white text-black font-black rounded-3xl disabled:opacity-20 uppercase text-xl">Confirm Selection</button>
                    </div>
                </div>
            );

            if (gameState === 'judging') return (
                <div className="min-h-screen p-8 flex flex-col items-center justify-center space-y-12 animate-pop">
                    <div className="text-center">
                        <div className="text-xs font-black uppercase text-neutral-500 mb-2">Grand Jury - Round {votingRoundIndex}</div>
                        <h2 className="text-5xl font-black italic uppercase">Choose the Winner</h2>
                    </div>
                    <div className="grid md:grid-cols-2 gap-8 w-full max-w-5xl">
                        {currentVotingGroup.map(sub => (
                            <button key={sub.id} onClick={() => voteForSubmission(sub.id)} className="p-12 bg-neutral-800 border-2 border-neutral-700 rounded-[40px] text-left hover:border-white transition-all group">
                                <p className="text-3xl font-bold leading-snug mb-8" dangerouslySetInnerHTML={{ __html: renderCardContent(sub.blackCard.text, sub.whiteCard) }} />
                                <div className="flex items-center gap-2 text-neutral-500 group-hover:text-white font-black uppercase text-xs">Select this combo <ChevronRight /></div>
                            </button>
                        ))}
                    </div>
                </div>
            );

            if (gameState === 'winner') return (
                <div className="min-h-screen p-12 flex flex-col space-y-16 custom-scrollbar overflow-y-auto animate-pop">
                    <div className="text-center flex flex-col items-center gap-4">
                        <Trophy />
                        <h1 className="text-7xl font-black uppercase italic tracking-tighter">Results</h1>
                        <div className="flex gap-12 mt-4">
                            {players.map(p => <div key={p.id} className="text-center"><div className="text-[10px] font-black uppercase text-neutral-500">{p.name}</div><div className="text-6xl font-black">{p.score}</div></div>)}
                        </div>
                    </div>
                    <div className="max-w-4xl mx-auto w-full space-y-6">
                        <h2 className="text-2xl font-black uppercase italic border-b border-neutral-800 pb-2">Winning Combos</h2>
                        {allSubmissions.filter(s => s.winner).sort((a,b) => a.round - b.round).map(sub => (
                            <div key={sub.id} className="bg-neutral-800/50 p-10 rounded-[40px] border border-neutral-800 flex items-center gap-10 animate-pop">
                                <div className="text-4xl font-black opacity-10">#{sub.round}</div>
                                <div className="flex-1">
                                    <p className="text-3xl font-bold leading-tight" dangerouslySetInnerHTML={{ __html: renderCardContent(sub.blackCard.text, sub.whiteCard) }} />
                                    <div className="text-[10px] font-black uppercase text-neutral-500 mt-4 tracking-widest">Won by {sub.playerName}</div>
                                </div>
                            </div>
                        ))}
                    </div>
                    <div className="flex justify-center pb-20">
                        <button onClick={() => setGameState('setup')} className="bg-white text-black px-16 py-6 rounded-3xl font-black text-2xl uppercase shadow-2xl">New Battle</button>
                    </div>
                </div>
            );

            return null;
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
